version: 2

updates:
  # Go modules (go.mod / go.sum)
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "08:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    groups:
      gomod:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore(deps)

  # GitHub Actions workflows (.github/workflows)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "08:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: chore(ci)

  # Docker base images (Dockerfile)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "08:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore(docker)
