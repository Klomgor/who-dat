name: 🚦 CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which kinds of files changed so unrelated jobs can skip.
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🔎 Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            docker:
              - 'Dockerfile'
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            workflows:
              - '.github/workflows/**'

  # gofmt: every file must be formatted.
  format:
    name: 🎨 Format
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: 🎨 Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

  # go vet: stdlib static checks.
  vet:
    name: 🔬 Vet
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: 🔬 Run go vet
        run: go vet ./...

  # staticcheck: the de-facto Go linter (bugs, simplifications, style).
  lint:
    name: 🧹 Lint (staticcheck)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: 🧹 Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  # go test with the race detector.
  test:
    name: ✅ Test
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: ✅ Run tests
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...
      - name: 📊 Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  # Ensure the whole module compiles.
  build:
    name: 🔨 Build
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: 🔨 Build all packages
        run: go build ./...

  # go.mod / go.sum must be tidy.
  tidy:
    name: 📦 Tidy
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: 📦 Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum \
            || { echo "::error::go.mod/go.sum are not tidy — run 'go mod tidy'"; exit 1; }

  # Scan dependencies for known vulnerabilities.
  vulncheck:
    name: 🛡️ Vulnerabilities
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: 🛡️ Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Build the Docker image and smoke-test the health endpoint.
  docker:
    name: 🐳 Docker Smoke
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 🔨 Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: who-dat:ci
          provenance: false
      - name: 💨 Smoke test
        run: |
          docker run -d --name wd-ci -p 8080:8080 who-dat:ci
          for i in $(seq 1 20); do
            if curl -fs http://localhost:8080/health >/dev/null; then
              echo "healthy after ${i}s"
              curl -s http://localhost:8080/health
              docker rm -f wd-ci >/dev/null
              exit 0
            fi
            sleep 1
          done
          echo "::error::container did not become healthy"
          docker logs wd-ci
          docker rm -f wd-ci >/dev/null
          exit 1

  # Lint the GitHub Actions workflows themselves.
  actionlint:
    name: 🤖 Workflow Lint
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🤖 Run actionlint
        run: |
          bash <(curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  # Scan the repository for committed secrets.
  secret-scan:
    name: 🔑 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🔑 Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
