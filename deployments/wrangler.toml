# Cloudflare Workers configuration for Who-Dat
name = "who-dat"
main = "cmd/workers/worker.js"
compatibility_date = "2024-01-01"

# Account ID (replace with your Cloudflare account ID)
# account_id = "your-account-id"

# Workers configuration
workers_dev = true

[build]
command = "make build-workers"

[build.upload]
format = "modules"

# Environment variables
[env.production.vars]
# AUTH_KEY = "your-secret-key"  # Uncomment and set for authentication
CACHE_TTL_SECONDS = "3600"
MAX_DOMAINS_PER_REQUEST = "10"
REQUEST_TIMEOUT_SECONDS = "5"
ENABLE_CACHE = "true"

# Development environment
[env.development.vars]
CACHE_TTL_SECONDS = "300"
ENABLE_CACHE = "true"

# Resources limits
[limits]
cpu_ms = 50

# Routes (configure your custom domain)
# [[routes]]
# pattern = "who-dat.yourdomain.com/*"
# zone_name = "yourdomain.com"
